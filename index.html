<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Project – First Bank of Nigeria</title>
    <style>
      /* ── Design tokens ── */
      :root {
        --navy:   #00008B;
        --gold:   #FFDF00;
        --white:  #FFFFFF;
        --navy-light: #0000b3;
        --navy-dark:  #000066;
        --shadow: 0 4px 18px rgba(0,0,139,.18);
        --radius: 6px;
        --font: Verdana, Geneva, sans-serif;
      }

      /* ── Reset / Base ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--font);
        background: #f0f2f8;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Top bar (HIG-style header) ── */
      header {
        background: var(--navy);
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 32px;
        height: 68px;
        box-shadow: 0 2px 10px rgba(0,0,139,.4);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      /* Logo area */
      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        flex-shrink: 0;
      }

      /* Real First Bank of Nigeria logo */
      .logo-img {
        height: 48px;
        width: auto;
        flex-shrink: 0;
        /* white bg pill so the logo is legible on dark header */
        background: #fff;
        border-radius: 6px;
        padding: 4px 8px;
        display: block;
      }

      /* Divider */
      .header-divider {
        width: 1px;
        height: 36px;
        background: rgba(255,255,255,.25);
        margin: 0 8px;
      }

      /* Page title inside header */
      .header-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--white);
        letter-spacing: .02em;
      }

      /* Gold accent bar under header */
      .gold-bar {
        height: 4px;
        background: var(--gold);
      }

      /* ── Main content ── */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 24px 64px;
      }

      /* Card */
      .card {
        background: var(--white);
        border-radius: 12px;
        box-shadow: var(--shadow);
        padding: 48px 40px 40px;
        max-width: 560px;
        width: 100%;
        border-top: 5px solid var(--navy);
      }

      .card-heading {
        font-size: 22px;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 6px;
        letter-spacing: .01em;
      }

      .card-sub {
        font-size: 12px;
        color: #666;
        margin-bottom: 36px;
        letter-spacing: .04em;
        text-transform: uppercase;
      }

      /* ── Navigation buttons ── */
      nav ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      nav ul li a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 22px;
        border-radius: var(--radius);
        font-family: var(--font);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        letter-spacing: .03em;
        transition: background .18s, transform .12s, box-shadow .18s;
        cursor: pointer;

        /* Primary button: navy bg, gold text */
        background: var(--navy);
        color: var(--gold);
        box-shadow: 0 3px 10px rgba(0,0,139,.25);
      }

      nav ul li a::after {
        content: '›';
        font-size: 20px;
        line-height: 1;
        opacity: .75;
        transition: transform .18s;
      }

      nav ul li a:hover {
        background: var(--navy-light);
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(0,0,139,.3);
      }

      nav ul li a:hover::after {
        transform: translateX(4px);
        opacity: 1;
      }

      nav ul li a:active {
        transform: translateY(0);
        background: var(--navy-dark);
        box-shadow: 0 2px 6px rgba(0,0,139,.2);
      }

      /* Alternate button style for variety */
      nav ul li:nth-child(even) a {
        background: var(--white);
        color: var(--navy);
        border: 2px solid var(--navy);
        box-shadow: 0 2px 8px rgba(0,0,139,.1);
      }

      nav ul li:nth-child(even) a:hover {
        background: var(--gold);
        border-color: var(--gold);
        color: var(--navy);
        box-shadow: 0 6px 18px rgba(255,223,0,.35);
      }

      /* ── Footer ── */
      footer {
        background: var(--navy);
        color: rgba(255,255,255,.55);
        text-align: center;
        font-size: 11px;
        padding: 16px 24px;
        letter-spacing: .05em;
      }

      footer span {
        color: var(--gold);
        font-weight: 700;
      }

      /* ── Responsive ── */
      @media (max-width: 480px) {
        header { padding: 0 16px; }
        .card  { padding: 32px 20px 28px; }
        .logo-img { height: 38px; }
      }
    </style>
  </head>
  <body>

    <!-- ══ HEADER ══ -->
    <header>
      <!-- First Bank of Nigeria logo (top-left) -->
      <a class="logo-wrap" href="index.html" aria-label="First Bank of Nigeria – Home">
        <img
          class="logo-img"
          src="https://www.firstbanknigeria.com/wp-content/uploads/2020/01/First-Bank.svg"
          alt="First Bank of Nigeria"
        />
      </a>

      <div class="header-divider"></div>
      <p class="header-title">Git Project Portal</p>
    </header>

    <!-- Gold accent line -->
    <div class="gold-bar"></div>

    <!-- ══ MAIN ══ -->
    <main>
      <div class="card">
        <h1 class="card-heading">Git Project</h1>
        <p class="card-sub">Select a team or project area to continue</p>

        <nav aria-label="Main navigation">
          <ul>
            <li><a href="devops.html">DevOps Project</a></li>
            <li><a href="backend-team.html">Backend Team</a></li>
            <li><a href="frontend-team.html">Frontend Team</a></li>
            <li><a href="bi-team.html">BI Team</a></li>
            <li><a href="ds-team.html">DS Team</a></li>
          </ul>
        </nav>
      </div>
    </main>

    <!-- ══ FOOTER ══ -->
    <footer>
      &copy; 2025 <span>First Bank of Nigeria</span> &nbsp;·&nbsp; Git Project Portal &nbsp;·&nbsp; All rights reserved.
    </footer>

  </body>
</html>
